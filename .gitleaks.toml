[extend]
useDefault = true

# Documentation env-var examples like `OMIM_API_KEY=<your key>` are literal
# placeholders, not real credentials, but match the default generic-api-key
# rule. Scope the allowlist to that exact placeholder shape rather than
# disabling the rule outright.
[[allowlists]]
description = "Doc placeholder credential values (e.g. <your key>)"
regexTarget = "match"
regexes = ['''(?i)<your[ _-]?\w*key\w*>''']
