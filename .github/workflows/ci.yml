# ─────────────────────────────────────────────────────────────────────────────
# CI  –  agentic-target-evidence
#
# Jobs
#   validate-commits  Pull-request only. Enforces Conventional Commits on every
#                     commit in the PR so Release Please can determine the
#                     correct next semver.
#
#   secrets-scan      Runs on every trigger. Gitleaks scans the diff (PRs) or
#                     full history (push/manual) for committed secrets.
#
#   quality           Runs on every trigger (PR, push to main, manual).
#                     Lint → format → type-check → unit/contract tests.
#                     Tests are filtered to "-m 'not integration and not smoke'"
#                     so no Postgres container, Ollama, or internet is required.
#                     External-service credentials are NOT exposed to fork PRs
#                     (pull_request trigger, not pull_request_target).
#
#   release-please    Runs ONLY on push/merge to main, gated on quality passing.
#                     Maintains a standing "release PR" that accumulates the
#                     version bump (pyproject.toml) and CHANGELOG.md entries
#                     from Conventional Commit history. Merging that PR is what
#                     actually tags vX.Y.Z and publishes the GitHub Release.
#
#   publish-ghcr      Runs only when release-please tagged a new release in
#                     THIS run (checked via its release_created output, not
#                     the `release` event — see the comment on that job for
#                     why). Builds and pushes all six Dockerfile targets to
#                     ghcr.io, tagged with both the release version and latest.
#
# Security model
#   • Workflow-wide default is contents: read.
#   • Each job adds only the permissions it actually needs.
#   • Secrets are never forwarded to fork PRs (they get empty strings by design).
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "Existing release tag to (re)publish to GHCR, e.g. v0.1.2 — leave empty for a normal manual CI run"
        required: false
        type: string

# One run per branch/PR at a time; cancel the in-progress run when a new
# commit is pushed.  The group key uses the PR number on PRs and the full
# ref (refs/heads/main) on direct pushes so they don't clobber each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Workflow-wide default: deny everything.
# Jobs grant only what they need (principle of least privilege).
permissions:
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1 · CONVENTIONAL COMMITS  (pull_request events only)
  # ═══════════════════════════════════════════════════════════════════════════
  validate-commits:
    name: "PR · Conventional Commits"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read        # read repo contents / commits
      pull-requests: read   # read the PR's commit list

    steps:
      - name: Lint every commit in the PR
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
          # Validates ALL commits in the PR, not just the latest one.
          # Failures here block the merge via branch-protection status checks.

  # ═══════════════════════════════════════════════════════════════════════════
  # 2 · SECRETS SCAN  (all trigger events)
  # ═══════════════════════════════════════════════════════════════════════════
  secrets-scan:
    name: "Gitleaks"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Full history so Gitleaks can diff PRs accurately and scan the whole
      # repo on push/manual triggers (shallow clones break its commit walk).
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No GITLEAKS_LICENSE needed: this repo is public, and gitleaks-action
          # is free for public repos. Required only for private-repo orgs.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 3 · QUALITY & TESTS  (all trigger events)
  # ═══════════════════════════════════════════════════════════════════════════
  quality:
    name: "Quality & Tests"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Mirror pytest's `pythonpath = ["src"]` setting so ruff, mypy, and the
    # test runner all resolve `from schemas.x import …` style imports the same
    # way without needing the installed package namespace.
    env:
      PYTHONPATH: src

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # astral-sh/setup-uv handles the uv binary + a content-addressed cache
      # keyed on uv.lock so the virtual-env is rebuilt only when deps change.
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.12
        run: uv python install 3.12

      # --locked enforces that uv.lock is the authoritative dependency graph;
      # any drift between pyproject.toml and uv.lock fails the build here.
      - name: Sync locked dependencies
        run: uv sync --locked

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: "Lint · ruff check"
        run: uv run ruff check .

      - name: "Lint · ruff format"
        run: uv run ruff format --check .

      # ── Type check ────────────────────────────────────────────────────────
      # Targets src/ only (strict mode, pydantic plugin, ignore_missing_imports
      # all configured in pyproject.toml [tool.mypy]).
      - name: "Type check · mypy"
        run: uv run mypy src/

      # ── Unit & contract tests ─────────────────────────────────────────────
      # Explicitly excludes:
      #   integration  – needs a live Postgres container (testcontainers)
      #   smoke        – needs Ollama + internet
      # Both of those marker groups run separately in dedicated workflows or
      # locally via `make test-integration` / `make test-smoke`.
      #
      # Dummy sentinel values below prevent accidental outbound inference calls
      # if a test ever forgets its mock.  Real secrets are NOT available here
      # for fork PRs — the `pull_request` trigger runs in the fork's context.
      - name: "Test · unit & contract (no external deps)"
        run: uv run pytest -m "not integration and not smoke" --tb=short -q --cov --cov-report=xml
        env:
          LANGFUSE_PUBLIC_KEY: "pk-lf-00000000-0000-0000-0000-000000000000"
          LANGFUSE_SECRET_KEY: "sk-lf-00000000-0000-0000-0000-000000000000"
          LANGFUSE_HOST: "http://localhost:3000"
          OPENAI_API_KEY: "sk-dummy-openai-key-for-ci"
          ANTHROPIC_API_KEY: "sk-ant-dummy-key-for-ci"
          OLLAMA_HOST: "http://localhost:11434"

      # ── Coverage upload ──────────────────────────────────────────────────
      # Public repo: tokenless upload works for same-repo pushes/PRs. A
      # CODECOV_TOKEN secret (if added later) avoids rate-limit flakiness and
      # is required for fork PRs.
      - name: "Coverage · upload to Codecov"
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════════════════
  # 4 · RELEASE PLEASE  (push/merge to main only, gated on quality)
  # ═══════════════════════════════════════════════════════════════════════════
  release-please:
    name: "Release Please"
    runs-on: ubuntu-latest
    needs: [quality, secrets-scan]
    # Only runs on the push event that fires when a PR is merged to main.
    # `needs` ensures both quality and the secrets scan passed on that same push.
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: write       # push to / open the standing release PR, push tags
      pull-requests: write  # open and update the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      # Parses Conventional Commits since the last release.
      #   • If unreleased feat/fix/breaking commits exist, opens or updates a
      #     standing "chore(main): release X.Y.Z" PR with the pyproject.toml
      #     version bump and CHANGELOG.md entry — nothing is tagged yet.
      #   • If THIS push is the merge of that release PR, it instead tags
      #     vX.Y.Z and publishes the GitHub Release. The publish-ghcr job
      #     below picks that up via outputs.release_created — NOT via the
      #     `release: published` event, because a release created with the
      #     default GITHUB_TOKEN does not trigger other workflow runs (GitHub's
      #     anti-recursion guard). Keeping the GHCR build in this same run
      #     sidesteps that entirely instead of needing a PAT/App token.
      # release-type and pre-1.0 bump behavior live in release-please-config.json
      # / .release-please-manifest.json (keeps feat commits bumping patch, not
      # minor, while major version is still 0 — see those files for why).
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main

      - name: Checkout repository
        if: steps.release.outputs.pr
        uses: actions/checkout@v4

      - name: Set up uv
        if: steps.release.outputs.pr
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        if: steps.release.outputs.pr
        run: uv python install 3.12

      # Release Please bumps `project.version` in pyproject.toml but doesn't
      # know uv.lock embeds that same version for the root package, so
      # `uv sync --locked` in the quality job fails on the release PR's
      # branch otherwise (the same drift fixed by hand in commit 3670512
      # under the old python-semantic-release setup).
      - name: Sync uv.lock on the release PR
        if: steps.release.outputs.pr
        run: |
          set -eu
          pr_branch=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.headBranchName')
          git fetch origin "$pr_branch"
          git checkout "$pr_branch"
          uv lock
          if ! git diff --quiet -- uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: sync uv.lock version with pyproject.toml"
            git push origin "HEAD:$pr_branch"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # 5 · PUBLISH TO GHCR
  #
  # Runs when release-please tagged a new release in this run, OR when
  # manually dispatched with a `publish_tag` input (for backfilling a release
  # that already exists — e.g. one tagged before this job existed). The
  # `always()` is required because a manual dispatch skips the release-please
  # job entirely (its own `if` restricts it to push events), and a skipped
  # `needs` job would otherwise make this job skip too by default.
  # ═══════════════════════════════════════════════════════════════════════════
  publish-ghcr:
    name: "Build & push · ${{ matrix.target }}"
    runs-on: ubuntu-latest
    needs: [release-please]
    if: >-
      always() &&
      (needs.release-please.outputs.release_created == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.publish_tag != ''))
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        # Mirrors the six build targets defined in Dockerfile / docker-compose.yml.
        target:
          - mcp-servers
          - agents-knowledge
          - agents-reasoning
          - report-agent
          - planner
          - chat

    steps:
      # fetch-depth: 0 is required so the manual-dispatch path below has the
      # release tags available locally — actions/checkout's shallow default
      # only fetches the triggering ref, with no tags at all.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag to publish
        id: tag
        run: echo "value=${{ inputs.publish_tag || needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Check out that tag
        if: github.event_name == 'workflow_dispatch'
        run: git checkout "${{ steps.tag.outputs.value }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # github.repository is already lowercase for this repo, but
      # ghcr.io requires a lowercase path in general — normalize defensively.
      # Manual backfills only get the version tag — `latest` is reserved for
      # the release-please-triggered path so an old backfill can't clobber it.
      - name: Compute image tags
        id: image
        run: |
          name="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/${{ matrix.target }}"
          {
            echo "tags<<EOF"
            echo "$name:${{ steps.tag.outputs.value }}"
            if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              echo "$name:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.image.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
