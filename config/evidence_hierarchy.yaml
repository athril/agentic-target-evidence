#
# Evidence-type hierarchy: a deterministic, disease-class-conditional 0-1 weight
# per structured evidence_type (and, where the claim text gives a usable signal,
# per subtype). Read by services/evidence/evidence_hierarchy.py (evidence_weight).
#
# Same 0-1 scale as the literature sjr_score weight used in
# `_lens_base._claim_sort_key` — structured and literature evidence sort on one
# consistent axis. `default` applies with no disease-class-specific override;
# `by_class` overrides key on any of the claim's resolved disease classes (first
# match wins; a claim's disease classes are usually a small, non-conflicting set).
#
# `subtypes` lets one evidence_type carry a context-dependent weight that the bare
# evidence_type can't express (DepMap is low signal everywhere except oncology;
# generic functional-genomics claims are not). CoreClaim carries no native subtype
# field, so `tokens` are matched case-insensitively against the claim's free text —
# a best-effort sniff, not a structured field; see infer_evidence_subtype.

genetics:
  default: 1.0

constraint:
  default: 1.0

clinical_trial:
  default: 0.9

regulatory:
  default: 0.6

druggability:
  default: 0.55

regulatory_element:
  default: 0.5

functional_genomics:
  default: 0.6
  subtypes:
    depmap:
      tokens: ["depmap", "chronos", "dependency score", "crispr screen", "rnai screen"]
      default: 0.25
      by_class:
        oncology: 1.0
    impc_viability:
      tokens: ["impc", "knockout mouse", "embryonic lethal", "viability phenotype"]
      default: 0.7

omics:
  default: 0.5

expression:
  default: 0.45
  subtypes:
    tumor_expression:
      tokens: ["tumor expression", "tcga", "tumor rna-seq", "tumour expression"]
      default: 0.25
      by_class:
        oncology: 0.8

patent:
  default: 0.4

# Not a CoreClaim evidence_type — the floor weight assigned to uncited model prior
# knowledge in the evidence-strength ledger (see _lens_base._build_evidence_ledger).
# Deliberately the lowest weight in the hierarchy: prior knowledge with no claim or
# source-evidence backing must never by itself raise verdict confidence.
llm_prior_weight: 0.05
